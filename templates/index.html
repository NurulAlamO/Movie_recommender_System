<!DOCTYPE html>
<html>
<head>
    <title>Emotion Movie Recommender</title>
    
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-gray-900 text-white">
    <header>
        <div class="bg-gray-700 shadow-sm px-4 py-3 flex flex-wrap items-center justify-between">

            <div class="w-full md:w-auto text-center md:text-left mb-2 md:mb-0">
                <h1 class="font-medium">
                    Movie <span class="text-rose-600 font-bold">Recommender</span>
                </h1>
            </div>
            <div class="w-full md:w-auto flex justify-center mb-2 md:mb-0">
                <div class="flex flex-wrap justify-center gap-2">
                    <a href="/favorites" class="bg-green-500 px-4 py-2 rounded-xl hover:bg-green-600">
                        Watchlist
                    </a>
                    <a href="/ai-recommend" class="bg-blue-400 px-4 py-2 rounded-xl hover:bg-blue-500">
                        AI Recommend
                    </a>
                </div>
            </div>
            <div class="w-full md:w-auto flex justify-center md:justify-end">
                <a href="/logout" class="bg-red-500 px-4 py-2 rounded-xl hover:bg-red-600">
                    Logout
                </a>
            </div>
        </div>
    </header>
    <main class="min-h-screen">
        <div class="max-w-6xl mx-auto text-center mt-12 px-4">
            <h1 class="text-3xl font-bold mb-6">Emotions and Movie Recommender</h1>
            <!-- FORM -->
            <form method="POST" id="movieForm" class="flex flex-wrap justify-center gap-4">              
                <div class="flex flex-wrap gap-2 w-full justify-center">
        <div class="w-full md:w-1/3">
            <select name="emotion" class="w-full p-2 rounded bg-gray-800 border border-gray-600 text-white">
                <option value="">Select Emotion</option>
                <option value="happy">Happy</option>
                <option value="sad">Sad</option>
                <option value="angry">Angry</option>
                <option value="romantic">Romantic</option>
                <option value="fear">Fear</option>
            </select>
        </div>

        <div class="w-full md:w-1/6">
            <button type="submit" name="action" value="recommend"
                class="w-full bg-yellow-400 text-black py-2 rounded hover:bg-yellow-500">
                Recommend
            </button>
        </div>
                </div>
                <div class="flex flex-wrap gap-2 w-full justify-center">
                    <div class="w-full md:w-1/3">
            <input type="text" name="search" placeholder="Search movie..."
                class="w-full p-2 rounded bg-gray-800 border border-gray-600 text-white">
                    </div>
                    <div class="w-full md:w-1/6">
            <button type="submit" name="action" value="search"
                class="w-full bg-blue-500 py-2 rounded hover:bg-blue-600">
                Search
            </button>
                    </div>
                </div>
            </form>
            <!-- LOADER section -->
            <div id="loader" class="text-center mt-6 hidden">
            <div class="animate-spin rounded-full h-10 w-10 border-4 border-yellow-400 border-t-transparent mx-auto"></div>
            <p class="mt-2">Fetching best movies for you...</p>
            </div>

            <!-- Movies section -->
            <div class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-4 mt-10" id="movieContainer">
            
            </div>
        </div>
    </main>
</body>
    <script>
        const form = document.getElementById("movieForm");
        const loader = document.getElementById("loader");
        const container = document.getElementById("movieContainer");

        form.addEventListener("submit", function(e) {
    e.preventDefault();

    loader.style.display = "block";
    container.innerHTML = ""; 

    const formData = new FormData(form);
    fetch("/get-movies", {
        method: "POST",
        body: formData
    })
    .then(res => res.json())
    .then(data => {
        loader.style.display = "none";
        if (data.length === 0) {
            container.innerHTML = "<h3>No movies found</h3>";
            return;
        }
        data.forEach(movie => {
            const card = `
                <div class="mb-4">
                    <div class="bg-gray-700 text-white h-full shadow-lg rounded overflow-hidden">                   
                        ${movie.poster ? `<img src="${movie.poster}" class="w-full h-48 object-cover">` : ""}
                        <div class="p-4">
                            <h5 class="text-lg font-semibold">${movie.title}</h5>
                            <p class="mt-1">⭐ ${movie.rating}</p>                      
                            <form action="/save" method="POST" class="mt-3">
                                <input type="hidden" name="movie" value="${movie.title}">
                                <button class="bg-green-500 hover:bg-green-600 px-4 py-2 rounded w-full">
                                    Save
                                </button>
                            </form>
                        </div>                   
                    </div>
                </div>
            `;
            container.innerHTML += card;
        });
    })
    .catch(err => {
        loader.style.display = "none";
        container.innerHTML = "<h3>Error loading movies</h3>";
    });
});
    </script>
</html>
